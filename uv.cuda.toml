# UV configuration for CUDA PyTorch
# Usage: uv sync --extra cuda --config-file uv.cuda.toml

[[tool.uv.index]]
name = "pytorch-cuda"
url = "https://download.pytorch.org/whl/cu124"
explicit = true

[tool.uv.sources]
torch = [{ index = "pytorch-cuda" }]
torchaudio = [{ index = "pytorch-cuda" }]
torchvision = [{ index = "pytorch-cuda" }]
