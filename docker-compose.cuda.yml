## CUDA (NVIDIA) override
## Usage: BACKEND=cuda docker compose -f docker-compose.yml -f docker-compose.cuda.yml up -d --build

services:
  streamlit:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - BACKEND=cuda
