upstream backend_pool {
    server backend:8000;
    keepalive 32;
}

upstream frontend_pool {
    server frontend:80;
    keepalive 16;
}

limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=general:10m rate=60r/s;

server {
    listen 80;
    server_name _;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # API — proxy to FastAPI backend
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://backend_pool;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 600s;

        # SSE support (critical for training monitoring)
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
    }

    # Observatory bridge script (static file, served to both domains)
    location = /observatory-bridge.js {
        alias /usr/share/nginx/html/observatory-bridge.js;
        add_header Content-Type application/javascript;
        add_header Cache-Control "no-cache";
        add_header Access-Control-Allow-Origin "*";
    }

    # Frontend — proxy to React SPA
    location / {
        limit_req zone=general burst=30 nodelay;
        proxy_pass http://frontend_pool;
        proxy_set_header Host $host;
    }
}
