[project]
name = "junon-time-series"
version = "0.1.0"
description = "Time series forecasting benchmark for piezometric data"
requires-python = ">=3.9,<3.13"

dependencies = [
    "numpy>=1.24.0",
    "pandas>=2.0.0",
    "matplotlib>=3.7.0",
    "scikit-learn>=1.3.0",
    "tqdm>=4.65.0",
    "codecarbon>=2.3.0",
    "einops>=0.7.0",
    # "torch>=2.0.0",  <-- Retiré pour éviter l'install CPU automatique par uv sync
    "scipy>=1.10.0",
]

[project.optional-dependencies]
notebooks = [
    "ipykernel>=6.0.0",
    "jupyter>=1.0.0",
    "jupyterlab>=4.0.0",
    "seaborn>=0.12.0",
    "shap>=0.42.0",
]

# Advanced time series forecasting (Darts & Nixtla)
advanced = [
    "darts>=0.32.0",  # 0.32.0+ supports pandas>=2.0 and Python>=3.9
    "neuralforecast>=1.6.0",
    "datasetsforecast>=0.0.8",
    "utilsforecast>=0.1.4",
    "pytorch-lightning>=2.0.0",
    "tensorboard>=2.13.0",
    "optuna>=3.0.0",
    "optuna-dashboard>=0.13.0",
    "sympy>=1.12",  # Requis par PyTorch dynamo
]

# Interactive dashboard
dashboard = [
    "streamlit>=1.28.0",
    "plotly>=5.17.0",
    "statsmodels>=0.14.0",  # For statistical tests
]

# All optional dependencies
all = [
    "ipykernel>=6.0.0",
    "jupyter>=1.0.0",
    "jupyterlab>=4.0.0",
    "seaborn>=0.12.0",
    "shap>=0.42.0",
    "darts>=0.32.0",
    "neuralforecast>=1.6.0",
    "datasetsforecast>=0.0.8",
    "utilsforecast>=0.1.4",
    "pytorch-lightning>=2.0.0",
    "tensorboard>=2.13.0",
    "optuna>=3.0.0",
    "optuna-dashboard>=0.13.0",
    "streamlit>=1.28.0",
    "plotly>=5.17.0",
    "statsmodels>=0.14.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["data_provider", "exp", "layers", "models", "tools"]
