[project]
name = "junon-time-series"
version = "0.1.0"
description = "Time series forecasting benchmark for piezometric data"
requires-python = ">=3.8,<3.13"

dependencies = [
    "numpy>=1.24.0",
    "pandas>=2.0.0",
    "matplotlib>=3.7.0",
    "scikit-learn>=1.3.0",
    "tqdm>=4.65.0",
    "codecarbon>=2.3.0",
    "einops>=0.7.0",
]

[project.optional-dependencies]
notebooks = [
    "ipykernel>=6.0.0",
    "jupyter>=1.0.0",
    "jupyterlab>=4.0.0",
    "seaborn>=0.12.0",
    "shap>=0.42.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["data_provider", "exp", "layers", "models", "tools"]
