[project]
name = "time-serie-explo"
version = "0.1.0"
description = "Time series forecasting dashboard for piezometric data"
requires-python = ">=3.10,<3.13"
readme = "README.md"
authors = [
    { name = "Nicolas Ringuet", email = "nicolas.ringuet@univ-tours.fr" }
]

dependencies = [
    "numpy>=1.24.0",
    "pandas>=2.0.0",
    "matplotlib>=3.7.0",
    "seaborn>=0.12.0",
    "scikit-learn>=1.3.0",
    "scipy>=1.10.0",
    "tqdm>=4.65.0",
    "codecarbon>=2.3.0",
    "einops>=0.7.0",
    
    # Dashboard & Viz
    "streamlit>=1.28.0",
    "plotly>=5.17.0",
    
    # Forecasting & ML
    "darts>=0.32.0",
    "pytorch-lightning>=2.0.0",
    "tensorboard>=2.13.0",
    "statsmodels>=0.14.0",
    "shap>=0.42.0",
    "optuna>=3.0.0",
    "optuna-dashboard>=0.13.0",
    
    # Torch (CPU by default, user should install CUDA version manually if needed)
    "torch>=2.0.0",
]

[project.optional-dependencies]
dev = [
    "ipykernel>=6.0.0",
    "jupyter>=1.0.0",
    "jupyterlab>=4.0.0",
    "black>=23.0.0",
    "isort>=5.12.0",
    "pytest>=7.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["dashboard"]
