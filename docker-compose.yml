## ──────────────────────────────────────────────
##  Junon Time-Series  –  docker compose config
##  Usage:
##    BACKEND=xpu  docker compose up -d --build   # Intel Arc
##    BACKEND=cuda docker compose up -d --build   # NVIDIA
##    docker compose up -d --build                 # CPU (default)
## ──────────────────────────────────────────────

services:
  # ── PostgreSQL ────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: junon-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-junon_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-junon}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── MLflow Tracking Server ────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.8.1
    container_name: junon-mlflow
    ports:
      - "${MLFLOW_PORT:-5000}:5000"
    volumes:
      - mlflow_db:/app/db
      - mlflow_artifacts:/app/mlruns
    working_dir: /app
    command: >
      mlflow server
        --host 0.0.0.0
        --port 5000
        --backend-store-uri sqlite:///db/mlflow.db
        --default-artifact-root ./mlruns
        --allowed-hosts *
    environment:
      MLFLOW_TRACKING_URI: sqlite:///db/mlflow.db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Streamlit Dashboard ───────────────────────
  streamlit:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        BACKEND: ${BACKEND:-cpu}
    container_name: junon-streamlit
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-junon_db}
      - POSTGRES_USER=${POSTGRES_USER:?POSTGRES_USER must be set in .env}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      # Bind mounts — data lives on host, visible in both Docker and local dev
      - ./data/prepared:/app/data/prepared
      - ./data/piezos:/app/data/piezos:ro
      - ./checkpoints:/app/checkpoints/darts
      - ./results:/app/results
      - ./figs:/app/figs
      - ./logs:/app/logs/darts
      # MLflow artifacts shared with mlflow container
      - mlflow_artifacts:/app/mlruns
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    networks:
      - default
      - brgm_net
    # Dockerfile CMD handles streamlit launch directly (no run_app.py)

networks:
  brgm_net:
    external: true
    name: hubeau_data_integration_default

volumes:
  postgres_data:
  mlflow_db:
  mlflow_artifacts:
