version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: junon-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-junon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-junon}
      POSTGRES_DB: ${POSTGRES_DB:-junon}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-junon}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for Celery broker and cache
  redis:
    image: redis:7-alpine
    container_name: junon-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: junon-backend
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-junon}
      - POSTGRES_USER=${POSTGRES_USER:-junon}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-junon}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./data:/app/data
      - ./checkpoints:/app/checkpoints
      - ./uploads:/app/uploads
      # Mount legacy dashboard for gradual migration
      - ./dashboard:/app/dashboard:ro
      - ./core:/app/core:ro
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Celery Worker for training jobs
  celery-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: junon-celery-worker
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-junon}
      - POSTGRES_USER=${POSTGRES_USER:-junon}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-junon}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./data:/app/data
      - ./checkpoints:/app/checkpoints
      - ./uploads:/app/uploads
      - ./dashboard:/app/dashboard:ro
      - ./core:/app/core:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=1

  # React Frontend (for development)
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: junon-frontend
    environment:
      - VITE_API_URL=http://localhost:${API_PORT:-8000}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:
  redis_data:
