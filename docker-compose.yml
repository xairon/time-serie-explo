version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: junon-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-junon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-junon}
      POSTGRES_DB: ${POSTGRES_DB:-junon}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-junon}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.9.0
    container_name: junon-mlflow
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    working_dir: /app
    command: mlflow ui --host 0.0.0.0 --backend-store-uri sqlite:///mlflow.db --default-artifact-root ./mlruns
    environment:
      - MLFLOW_TRACKING_URI=sqlite:///mlflow.db

  # Streamlit Dashboard
  streamlit:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: junon-streamlit
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-junon}
      - POSTGRES_USER=${POSTGRES_USER:-junon}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-junon}
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - .:/app
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"
    depends_on:
      postgres:
        condition: service_healthy
    command: python run_app.py --host 0.0.0.0

volumes:
  postgres_data:
